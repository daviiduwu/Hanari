<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanari · English Linguistics Trainer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; min-height: 80px; padding: 0.75rem; }
    button { margin-top: 0.75rem; padding: 0.6rem 1rem; }
    .card { margin-top: 1rem; border: 1px solid #ddd; border-radius: 8px; padding: 0.9rem; }
    .error { border-left: 4px solid #c0392b; padding-left: 0.75rem; margin: 0.75rem 0; }
    .ok { color: #1f8b4c; }
    ul { padding-left: 1rem; }
  </style>
</head>
<body>
  <h1>Hanari · Entrenador lingüístico de inglés</h1>
  <p>Analiza, corrige y genera práctica desde los errores conceptuales.</p>

  <textarea id="sentenceInput" placeholder="She have studying English now."></textarea>
  <button id="analyzeBtn">Analizar oración</button>

  <section id="clauseResult" class="card"></section>
  <section id="feedbackResult" class="card"></section>
  <section class="card">
    <h3>Tokens y etiquetas</h3>
    <ul id="tokenResult"></ul>
  </section>
  <section class="card">
    <h3>Ejercicios generados</h3>
    <ul id="exerciseResult"></ul>
  </section>

  <script type="module">
    import { analyze } from "./src/linguistics/analyzer.js"

    const sentenceInput = document.getElementById("sentenceInput")
    const clauseResult = document.getElementById("clauseResult")
    const feedbackResult = document.getElementById("feedbackResult")
    const tokenResult = document.getElementById("tokenResult")
    const exerciseResult = document.getElementById("exerciseResult")
    const analyzeBtn = document.getElementById("analyzeBtn")

    function renderFeedback(result) {
      if (!result.errors.length) {
        feedbackResult.innerHTML = `<h3 class="ok">Sin errores detectados</h3><p>La oración pasa las reglas actuales del MVP.</p>`
        return
      }

      const errorsHtml = result.errors.map((err) => `
        <article class="error">
          <strong>${err.title}</strong>
          <p><strong>Qué está mal:</strong> ${err.explanation}</p>
          <p><strong>Por qué:</strong> ${err.why}</p>
          <p><strong>Sugerencia:</strong> ${err.suggestion}</p>
        </article>
      `).join("")

      feedbackResult.innerHTML = `
        <h3>Corrección y explicación</h3>
        <p><strong>Oración sugerida:</strong> ${result.correction}</p>
        ${errorsHtml}
      `
    }

    function renderExercises(exercises) {
      exerciseResult.innerHTML = exercises
        .map((ex) => `<li><strong>${ex.type}</strong> · ${ex.prompt}<br/><em>Respuesta:</em> ${ex.answer}</li>`)
        .join("") || "<li>No hay ejercicios porque no se detectaron errores.</li>"
    }

    function render(result) {
      if (!result.clause) {
        clauseResult.innerHTML = "<strong>Sin datos.</strong> Escribe una oración para analizar."
        tokenResult.innerHTML = ""
        renderFeedback(result)
        renderExercises(result.exercises)
        return
      }

      clauseResult.innerHTML = `
        <h3>Estructura de cláusula</h3>
        <p><strong>Subject:</strong> ${result.clause.subject ?? "N/A"}</p>
        <p><strong>Auxiliary:</strong> ${result.clause.auxiliary ?? "N/A"}</p>
        <p><strong>Main verb:</strong> ${result.clause.mainVerb ?? "N/A"}</p>
        <p><strong>Aspect:</strong> ${result.clause.aspect}</p>
        <p><strong>Function:</strong> ${result.clause.function}</p>
      `

      tokenResult.innerHTML = result.tokens
        .map((t) => `<li><strong>${t.token}</strong> → ${t.tags.join(", ")}</li>`)
        .join("")

      renderFeedback(result)
      renderExercises(result.exercises)
    }

    analyzeBtn.addEventListener("click", () => {
      const result = analyze(sentenceInput.value)
      render(result)
    })
  </script>
</body>
</html>
